<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velvet & Co. — Tienda para Adultos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:#0d0b10; --bg2:#14111a; --bg3:#1c1825;
      --card:#1e1929; --card2:#251f33;
      --accent:#c8a96e; --accent2:#e8c98a;
      --text:#f2ede8; --muted:#8a7f9a; --subtle:#4a4260;
      --border:#2e2742; --red:#d96b6b;
      --radius:16px; --radius-sm:8px;
    }
    html { scroll-behavior:smooth; }
    body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; font-size:14px; line-height:1.6; }
    h1,h2,h3,.serif { font-family:'Playfair Display',serif; }
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:var(--bg); }
    ::-webkit-scrollbar-thumb { background:var(--subtle); border-radius:4px; }

    /* NAV */
    nav { position:sticky; top:0; z-index:100; background:rgba(13,11,16,.95); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 2rem; height:60px; }
    .nav-brand { font-family:'Playfair Display',serif; font-size:22px; color:var(--accent); letter-spacing:2px; font-style:italic; text-decoration:none; }
    .nav-right { display:flex; align-items:center; gap:1rem; }
    .search-bar { background:var(--card); border:1px solid var(--border); color:var(--text); padding:8px 16px; border-radius:30px; font-size:13px; font-family:'DM Sans',sans-serif; outline:none; width:200px; transition:border-color .2s,width .3s; }
    .search-bar::placeholder { color:var(--muted); }
    .search-bar:focus { border-color:var(--accent); width:240px; }
    .cart-btn { background:var(--card2); border:1px solid var(--border); color:var(--text); padding:8px 18px; border-radius:30px; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:13px; display:flex; align-items:center; gap:8px; transition:border-color .2s,color .2s; }
    .cart-btn:hover { border-color:var(--accent); color:var(--accent); }
    .cart-badge { background:var(--accent); color:#0d0b10; border-radius:50%; width:18px; height:18px; font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; transition:transform .2s; }
    .cart-badge.bump { transform:scale(1.4); }

    /* HERO */
    .hero { background:linear-gradient(135deg,#0d0b10 0%,#1a0f2e 50%,#0d1a2e 100%); padding:3rem 2rem; text-align:center; border-bottom:1px solid var(--border); position:relative; overflow:hidden; }
    .hero::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 50% 120%,rgba(200,169,110,.08) 0%,transparent 60%); pointer-events:none; }
    .hero-eyebrow { font-size:11px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-bottom:.5rem; }
    .hero h2 { font-size:2.2rem; color:var(--text); margin-bottom:.5rem; font-style:italic; }
    .hero-line { width:60px; height:1px; background:linear-gradient(90deg,transparent,var(--accent),transparent); margin:1rem auto; }
    .hero-sub { font-size:13px; color:var(--muted); letter-spacing:1px; }

    /* CATEGORY BAR */
    .cats { display:flex; gap:.5rem; padding:1.25rem 2rem; overflow-x:auto; background:var(--bg2); border-bottom:1px solid var(--border); scrollbar-width:none; }
    .cats::-webkit-scrollbar { display:none; }
    .cat-btn { white-space:nowrap; padding:6px 18px; border-radius:30px; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; font-size:12px; font-family:'DM Sans',sans-serif; transition:background .2s,color .2s,border-color .2s; letter-spacing:.5px; }
    .cat-btn:hover, .cat-btn.active { background:var(--accent); color:#0d0b10; border-color:var(--accent); font-weight:500; }

    /* PRODUCTS */
    .section { padding:1.5rem 2rem; }
    .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.25rem; }
    .section-title { font-size:1.1rem; color:var(--accent); letter-spacing:1px; font-style:italic; font-family:'Playfair Display',serif; }
    .count-badge { font-size:12px; color:var(--muted); }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:1rem; }

    /* PRODUCT CARD */
    .product-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; transition:border-color .25s,transform .25s; cursor:pointer; }
    .product-card:hover { border-color:var(--accent); transform:translateY(-2px); }
    .product-img { width:100%; aspect-ratio:1; background:var(--card2); display:flex; align-items:center; justify-content:center; font-size:3.5rem; position:relative; }
    .product-badge { position:absolute; top:10px; right:10px; background:var(--accent); color:#0d0b10; font-size:10px; font-weight:700; padding:3px 8px; border-radius:30px; letter-spacing:.5px; }
    .product-badge.hot { background:var(--red); color:#fff; }
    .product-info { padding:1rem; }
    .product-cat { font-size:10px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:4px; }
    .product-name { font-size:14px; font-weight:500; margin-bottom:.5rem; line-height:1.3; }
    .product-stars { color:var(--accent); font-size:11px; margin-bottom:.5rem; }
    .product-bottom { display:flex; align-items:center; justify-content:space-between; }
    .product-price { font-family:'Playfair Display',serif; font-size:1.1rem; color:var(--accent2); }
    .add-btn { background:var(--accent); color:#0d0b10; border:none; border-radius:var(--radius-sm); width:32px; height:32px; cursor:pointer; font-size:18px; font-weight:700; display:flex; align-items:center; justify-content:center; transition:background .15s,transform .15s; }
    .add-btn:hover { background:var(--accent2); transform:scale(1.1); }
    .add-btn:active { transform:scale(.95); }
    .empty-state { grid-column:1/-1; text-align:center; padding:3rem; color:var(--muted); }

    /* OVERLAY */
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:200; opacity:0; pointer-events:none; transition:opacity .3s; }
    .overlay.open { opacity:1; pointer-events:all; }

    /* CART DRAWER */
    .cart-drawer { position:fixed; right:0; top:0; bottom:0; width:380px; background:var(--bg2); border-left:1px solid var(--border); z-index:201; transform:translateX(100%); transition:transform .3s cubic-bezier(.4,0,.2,1); display:flex; flex-direction:column; }
    .cart-drawer.open { transform:translateX(0); }
    .cart-head { padding:1.25rem 1.5rem; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .cart-title { font-family:'Playfair Display',serif; font-size:1.2rem; font-style:italic; color:var(--accent); }
    .close-btn { background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; padding:4px; border-radius:6px; transition:color .2s; line-height:1; }
    .close-btn:hover { color:var(--text); }
    .cart-items { flex:1; overflow-y:auto; padding:1rem 1.5rem; }
    .cart-empty { text-align:center; padding:3rem 1rem; }
    .cart-empty-icon { font-size:3rem; margin-bottom:1rem; }
    .cart-empty p { color:var(--muted); }
    .cart-empty small { color:var(--subtle); font-size:12px; margin-top:.5rem; display:block; }
    .cart-item { display:flex; gap:1rem; padding:.875rem 0; border-bottom:1px solid var(--border); }
    .cart-item-img { width:56px; height:56px; background:var(--card); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.8rem; flex-shrink:0; }
    .cart-item-info { flex:1; min-width:0; }
    .cart-item-name { font-size:13px; font-weight:500; margin-bottom:3px; line-height:1.3; }
    .cart-item-price { font-family:'Playfair Display',serif; color:var(--accent); font-size:14px; }
    .qty-ctrl { display:flex; align-items:center; gap:8px; margin-top:6px; }
    .qty-btn { background:var(--card2); border:1px solid var(--border); color:var(--text); width:26px; height:26px; border-radius:6px; cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; transition:border-color .15s,color .15s; }
    .qty-btn:hover { border-color:var(--accent); color:var(--accent); }
    .qty-num { font-size:13px; min-width:20px; text-align:center; }
    .remove-btn { background:none; border:none; color:var(--subtle); cursor:pointer; font-size:16px; padding:4px; transition:color .2s; align-self:flex-start; line-height:1; }
    .remove-btn:hover { color:var(--red); }
    .cart-foot { padding:1.25rem 1.5rem; border-top:1px solid var(--border); flex-shrink:0; }
    .cart-row { display:flex; justify-content:space-between; margin-bottom:.5rem; font-size:13px; color:var(--muted); }
    .cart-row.shipping span:last-child { color:var(--accent); }
    .cart-total { display:flex; justify-content:space-between; align-items:baseline; margin:.75rem 0 1.25rem; }
    .cart-total-label { font-size:15px; font-weight:500; }
    .cart-total-price { font-family:'Playfair Display',serif; font-size:1.4rem; color:var(--accent2); }
    .checkout-btn { width:100%; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#0d0b10; border:none; border-radius:12px; padding:14px; font-size:15px; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; transition:opacity .2s; letter-spacing:.5px; }
    .checkout-btn:hover { opacity:.9; }
    .checkout-btn:disabled { opacity:.35; cursor:not-allowed; }

    /* MODAL */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:300; display:flex; align-items:center; justify-content:center; padding:1rem; opacity:0; pointer-events:none; transition:opacity .3s; }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal { background:var(--bg2); border:1px solid var(--border); border-radius:20px; max-width:500px; width:100%; padding:2rem; position:relative; max-height:90vh; overflow-y:auto; }
    .modal-close { position:absolute; top:1rem; right:1rem; background:none; border:none; color:var(--muted); font-size:22px; cursor:pointer; line-height:1; transition:color .2s; }
    .modal-close:hover { color:var(--text); }
    .modal-emoji { font-size:5rem; text-align:center; margin-bottom:1rem; }
    .modal-cat { font-size:11px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:.25rem; }
    .modal-name { font-family:'Playfair Display',serif; font-size:1.4rem; font-style:italic; margin-bottom:.75rem; }
    .modal-desc { color:var(--muted); line-height:1.7; font-size:14px; margin-bottom:1.25rem; }
    .modal-tags { display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:1.25rem; }
    .tag { background:var(--card); border:1px solid var(--border); padding:4px 12px; border-radius:30px; font-size:11px; color:var(--muted); }
    .modal-bottom { display:flex; align-items:center; justify-content:space-between; }
    .modal-price { font-family:'Playfair Display',serif; font-size:1.8rem; color:var(--accent2); }
    .modal-add { background:var(--accent); color:#0d0b10; border:none; border-radius:10px; padding:12px 24px; font-size:14px; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; transition:background .2s; }
    .modal-add:hover { background:var(--accent2); }

    /* TOAST */
    .toast { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(100px); background:var(--card2); border:1px solid var(--accent); color:var(--text); padding:12px 24px; border-radius:30px; font-size:13px; z-index:400; transition:transform .3s cubic-bezier(.4,0,.2,1); white-space:nowrap; pointer-events:none; }
    .toast.show { transform:translateX(-50%) translateY(0); }

    /* SUCCESS */
    .success-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:3rem 1rem; text-align:center; }
    .success-icon { font-size:4rem; margin-bottom:1rem; }
    .success-screen h3 { font-family:'Playfair Display',serif; font-size:1.5rem; color:var(--accent); font-style:italic; margin-bottom:.5rem; }
    .success-screen p { color:var(--muted); font-size:14px; margin-bottom:1.5rem; line-height:1.6; }
    .back-btn { background:transparent; border:1px solid var(--accent); color:var(--accent); padding:10px 24px; border-radius:30px; cursor:pointer; font-family:'DM Sans',sans-serif; transition:background .2s,color .2s; }
    .back-btn:hover { background:var(--accent); color:#0d0b10; }

    /* RESPONSIVE */
    @media (max-width:768px) {
      nav { padding:0 1rem; }
      .search-bar { display:none; }
      .cart-drawer { width:100%; }
      .section { padding:1.25rem 1rem; }
      .cats { padding:1rem; }
      .grid { grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:.75rem; }
      .hero h2 { font-size:1.7rem; }
    }
    @media (max-width:400px) {
      .grid { grid-template-columns:1fr 1fr; }
    }
  </style>
</head>

        { id:18, name:'Limpiador de Juguetes',       cat:'Accesorios',  emoji:'🫧', price:10990, stars:5, badge:'',           desc:'Spray desinfectante de base acuosa, sin alcohol. Compatible con todos los materiales. 150ml.', tags:['Sin alcohol','150ml','Universal'] },
      ]

    /* ============================================================
       MÓDULO CARRITO
    ============================================================ */
    const Cart = (() => {
      let items = {};
      let _cb = null;

      function onUpdate(cb) { _cb = cb; }
      function _notify()    { if (_cb) _cb(getState()); }

      function add(product) {
        if (!items[product.id]) items[product.id] = { product, qty: 0 };
        items[product.id].qty++;
        _notify();
      }
      function remove(id)       { delete items[id]; _notify(); }
      function clear()          { items = {}; _notify(); }
      function changeQty(id, d) {
        if (!items[id]) return;
        items[id].qty += d;
        if (items[id].qty <= 0) delete items[id];
        _notify();
      }
      function getState() {
        const list  = Object.values(items);
        const count = list.reduce((s, i) => s + i.qty, 0);
        const total = list.reduce((s, i) => s + i.product.price * i.qty, 0);
        return { items: list, count, total };
      }

      return { add, remove, clear, changeQty, getState, onUpdate };
    })();

    /* ============================================================
       LÓGICA DE LA APP
    ============================================================ */
    let activeCategory = 'Todos';
    let searchQuery    = '';
    let toastTimer     = null;

    /* ── Init ── */
    Cart.onUpdate(updateCartUI);
    renderCategoryBar();
    renderProducts();
    updateCartUI(Cart.getState());

    /* ── Categorías ── */
    function renderCategoryBar() {
      document.getElementById('catBar').innerHTML = DB.categories.map(c =>
        `<button class="cat-btn${c === activeCategory ? ' active' : ''}"
                 onclick="setCategory('${c}')">${c}</button>`
      ).join('');
    }

    function setCategory(cat) {
      activeCategory = cat;
      renderCategoryBar();
      renderProducts();
    }

    /* ── Búsqueda ── */
    function handleSearch() {
      searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
      renderProducts();
    }

    /* ── Filtrado ── */
    function getFiltered() {
      return DB.products.filter(p => {
        const catOk    = activeCategory === 'Todos' || p.cat === activeCategory;
        const searchOk = !searchQuery
          || p.name.toLowerCase().includes(searchQuery)
          || p.cat.toLowerCase().includes(searchQuery)
          || p.tags.some(t => t.toLowerCase().includes(searchQuery));
        return catOk && searchOk;
      });
    }

    /* ── Renderizado productos ── */
    function renderProducts() {
      const list = getFiltered();
      document.getElementById('sectionTitle').textContent =
        activeCategory === 'Todos' ? 'Todos los productos' : activeCategory;
      document.getElementById('countBadge').textContent =
        `${list.length} producto${list.length !== 1 ? 's' : ''}`;

      document.getElementById('productGrid').innerHTML = list.length
        ? list.map(productCardHTML).join('')
        : `<div class="empty-state"><p style="font-size:2rem;margin-bottom:.5rem">🔍</p><p>Sin resultados</p></div>`;
    }

    function productCardHTML(p) {
      const badge = p.badge
        ? `<span class="product-badge${p.badge === 'Hot' ? ' hot' : ''}">${p.badge}</span>` : '';
      return `
        <div class="product-card" onclick="openModal(${p.id})">
          <div class="product-img"><span>${p.emoji}</span>${badge}</div>
          <div class="product-info">
            <div class="product-cat">${p.cat}</div>
            <div class="product-name">${p.name}</div>
            <div class="product-stars">${'★'.repeat(p.stars)}${'☆'.repeat(5-p.stars)}</div>
            <div class="product-bottom">
              <span class="product-price">$${p.price.toLocaleString('es-CL')}</span>
              <button class="add-btn" onclick="addToCart(event,${p.id})">+</button>
            </div>
          </div>
        </div>`;
    }

    /* ── Modal ── */
    function openModal(id) {
      const p = DB.products.find(x => x.id === id);
      if (!p) return;
      document.getElementById('mEmoji').textContent = p.emoji;
      document.getElementById('mCat').textContent   = p.cat;
      document.getElementById('mName').textContent  = p.name;
      document.getElementById('mDesc').textContent  = p.desc;
      document.getElementById('mPrice').textContent = `$${p.price.toLocaleString('es-CL')}`;
      document.getElementById('mTags').innerHTML    = p.tags.map(t => `<span class="tag">${t}</span>`).join('');
      document.getElementById('mAddBtn').onclick    = () => { addToCartById(p.id); closeModal(); };
      document.getElementById('modalOverlay').classList.add('open');
      document.getElementById('overlay').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
      document.getElementById('overlay').classList.remove('open');
    }

    /* ── Carrito ── */
    function addToCart(e, id) {
      e.stopPropagation();
      addToCartById(id);
    }

    function addToCartById(id) {
      const p = DB.products.find(x => x.id === id);
      if (!p) return;
      Cart.add(p);
      showToast(`${p.emoji} ${p.name} añadido`);
    }

    function updateCartUI({ items, count, total }) {
      /* badge */
      const badge = document.getElementById('cartBadge');
      badge.textContent = count;
      badge.classList.remove('bump');
      void badge.offsetWidth;
      if (count > 0) badge.classList.add('bump');

      /* totales */
      document.getElementById('subtotalVal').textContent = `$${total.toLocaleString('es-CL')}`;
      document.getElementById('totalVal').textContent    = `$${total.toLocaleString('es-CL')}`;
      document.getElementById('checkoutBtn').disabled    = items.length === 0;

      /* lista */
      const container = document.getElementById('cartItems');
      if (!items.length) {
        container.innerHTML = `
          <div class="cart-empty">
            <div class="cart-empty-icon">🛍️</div>
            <p>Tu carrito está vacío</p>
            <small>Explora nuestra colección</small>
          </div>`;
        return;
      }
      container.innerHTML = items.map(({ product: p, qty }) => `
        <div class="cart-item">
          <div class="cart-item-img">${p.emoji}</div>
          <div class="cart-item-info">
            <div class="cart-item-name">${p.name}</div>
            <div class="cart-item-price">$${(p.price * qty).toLocaleString('es-CL')}</div>
            <div class="qty-ctrl">
              <button class="qty-btn" onclick="Cart.changeQty(${p.id},-1)">−</button>
              <span class="qty-num">${qty}</span>
              <button class="qty-btn" onclick="Cart.changeQty(${p.id},1)">+</button>
            </div>
          </div>
          <button class="remove-btn" onclick="Cart.remove(${p.id})">✕</button>
        </div>`
      ).join('');
    }

    /* ── Drawer ── */
    function toggleCart() {
      const drawer = document.getElementById('cartDrawer');
      const ov     = document.getElementById('overlay');
      if (drawer.classList.contains('open')) {
        drawer.classList.remove('open');
        ov.classList.remove('open');
      } else {
        closeModal();
        drawer.classList.add('open');
        ov.classList.add('open');
      }
    }

    function closeAll() {
      document.getElementById('cartDrawer').classList.remove('open');
      document.getElementById('modalOverlay').classList.remove('open');
      document.getElementById('overlay').classList.remove('open');
    }

    /* ── Checkout ── */
    function checkout() {
      document.getElementById('cartItems').innerHTML = `
        <div class="success-screen">
          <div class="success-icon">🎉</div>
          <h3>¡Pedido confirmado!</h3>
          <p>Tu pedido fue procesado exitosamente.<br>
             Recibirás un email de confirmación.<br>
             Envío discreto en 2–3 días hábiles.</p>
          <button class="back-btn" onclick="resetCheckout()">Seguir comprando</button>
        </div>`;
      document.getElementById('cartFoot').style.display = 'none';
      Cart.clear();
    }

    function resetCheckout() {
      document.getElementById('cartFoot').style.display = 'block';
      updateCartUI(Cart.getState());
      closeAll();
    }

    /* ── Toast ── */
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
    }
  </script>
</body>
</html>
