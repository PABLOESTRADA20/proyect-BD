<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Velvet &amp; Co. — Tienda para Adultos</title>
  <meta name="description" content="Tienda de artículos para adultos. Envío discreto, devolución 30 días, pago seguro."/>
  <link rel="stylesheet" href="/css/styles.css"/>
</head>
<body>

  <!-- ── Navegación ── -->
  <nav>
    <a class="nav-brand" href="#">Velvet &amp; Co.</a>
    <div class="nav-right">
      <input
        class="search-bar"
        type="search"
        id="searchInput"
        placeholder="Buscar productos…"
        oninput="handleSearch()"
        aria-label="Buscar productos"
      />
      <button class="cart-btn" onclick="toggleCart()" aria-label="Abrir carrito">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
        Carrito
        <span class="cart-badge" id="cartBadge" aria-live="polite">0</span>
      </button>
    </div>
  </nav>

  <!-- ── Hero ── -->
  <header class="hero">
    <p class="hero-eyebrow">Colección exclusiva</p>
    <h2>Placer sin límites</h2>
    <div class="hero-line" aria-hidden="true"></div>
    <p class="hero-sub">Envío discreto &nbsp;·&nbsp; Devolución 30 días &nbsp;·&nbsp; Pago seguro</p>
  </header>

  <!-- ── Barra de categorías ── -->
  <nav class="cats" id="catBar" aria-label="Filtrar por categoría">
    <button class="cat-btn active" onclick="setCategory('Todos')">Todos</button>
  </nav>

  <!-- ── Cuadrícula de productos ── -->
  <main class="section">
    <div class="section-header">
      <h2 class="section-title" id="sectionTitle">Todos los productos</h2>
      <span class="count-badge" id="countBadge" aria-live="polite"></span>
    </div>
    <div class="grid" id="productGrid">
      <div class="loading"><div class="spinner"></div><p>Cargando productos…</p></div>
    </div>
  </main>

  <!-- ── Overlay ── -->
  <div class="overlay" id="overlay" onclick="closeAll()" aria-hidden="true"></div>

  <!-- ── Carrito (drawer lateral) ── -->
  <aside class="cart-drawer" id="cartDrawer" aria-label="Carrito de compras">
    <div class="cart-head">
      <span class="cart-title">Mi carrito</span>
      <button class="close-btn" onclick="toggleCart()" aria-label="Cerrar carrito">✕</button>
    </div>

    <div class="cart-items" id="cartItems">
      <div class="cart-empty">
        <div class="cart-empty-icon">🛍️</div>
        <p>Tu carrito está vacío</p>
      </div>
    </div>

    <div class="cart-foot" id="cartFoot">
      <div class="cart-row"><span>Subtotal</span><span id="subtotalVal">$0</span></div>
      <div class="cart-row shipping"><span>Envío</span><span>Gratis</span></div>
      <div class="cart-total">
        <span class="cart-total-label">Total</span>
        <span class="cart-total-price" id="totalVal">$0</span>
      </div>
      <input
        class="email-input"
        type="email"
        id="emailInput"
        placeholder="tu@email.com (opcional)"
        aria-label="Correo electrónico"
      />
      <button
        class="checkout-btn"
        id="checkoutBtn"
        onclick="checkout()"
        disabled
        aria-label="Finalizar compra"
      >
        Finalizar compra
      </button>
    </div>
  </aside>

  <!-- ── Modal de detalle ── -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="mName">
    <div class="modal">
      <button class="modal-close" onclick="closeModal()" aria-label="Cerrar">✕</button>
      <div  class="modal-emoji" id="mEmoji" aria-hidden="true"></div>
      <div  class="modal-cat"   id="mCat"></div>
      <h3   class="modal-name"  id="mName"></h3>
      <p    class="modal-desc"  id="mDesc"></p>
      <div  class="modal-tags"  id="mTags"></div>
      <div class="modal-bottom">
        <span class="modal-price" id="mPrice"></span>
        <button class="modal-add" id="mAddBtn">Agregar al carrito</button>
      </div>
    </div>
  </div>

  <!-- ── Toast ── -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- ── Script principal ── -->
  <script src="/js/app.js"></script>

</body>
</html>
